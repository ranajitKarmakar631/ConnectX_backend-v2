name: Node.js CI/CD

on:
  push:
    branches: ["main", "dev"]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
      redis:
        image: redis:latest
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Start Server Test
        env:
          PORT: 4000
          MONGO_URI: mongodb://localhost:27017/connectx
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: "test_secret"
        run: |
          npx tsx index.ts &
          echo "Waiting for server to start..."
          for i in {1..20}; do
            if curl -s http://localhost:4000 > /dev/null; then
              echo "Server is up!"
              curl -v http://localhost:4000
              exit 0
            fi
            echo "Waiting..."
            sleep 2
          done
          echo "Server failed to start in time"
          exit 1
