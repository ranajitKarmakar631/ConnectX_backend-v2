name: Node.js CI/CD

on:
  push:
    branches: ["main", "dev"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "npm"

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Start Server Test
        run: |
          node dist/index.ts &
          echo "Waiting for server to start..."
          for i in {1..20}; do
            if curl -s http://localhost:4000 > /dev/null; then
              echo "Server is up!"
              curl -v http://localhost:4000
              exit 0
            fi
            echo "Waiting..."
            sleep 2
          done
          echo "Server failed to start in time"
          exit 1